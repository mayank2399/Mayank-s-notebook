<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayank Sinha Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 antialiased font-sans transition-colors duration-200">

    <header class="sticky top-0 z-40 w-full border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-950 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <button id="mobileMenuBtn" class="md:hidden text-gray-600 dark:text-gray-300 focus:outline-none text-xl">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="flex items-center space-x-2 text-green-600 dark:text-green-400 font-bold text-xl tracking-wide cursor-pointer" onclick="window.location.hash = ''">
                <i class="fa-solid fa-code-branch"></i>
                <span>Mayank Sinha Notes</span>
            </div>
            <div class="relative ml-4">
                <select id="courseSelect" class="appearance-none bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-md py-1.5 pl-3 pr-8 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-green-500">
                    </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                    <i class="fa-solid fa-chevron-down text-xs"></i>
                </div>
            </div>
        </div>

        <div class="flex-1 max-w-md mx-8 hidden sm:block relative cursor-pointer" id="searchTrigger">
            <div class="w-full bg-gray-100 dark:bg-gray-800 text-gray-500 rounded-md pl-10 pr-4 py-1.5 border border-transparent text-sm flex items-center justify-between">
                <span class="flex items-center"><i class="fa-solid fa-magnifying-glass mr-2"></i> Search documentation...</span>
                <kbd class="bg-white dark:bg-gray-700 px-1.5 py-0.5 rounded text-xs shadow border">Ctrl+K</kbd>
            </div>
        </div>

        <div class="flex items-center space-x-4">
            <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-300">
                <i class="fa-solid fa-moon dark:hidden"></i>
                <i class="fa-solid fa-sun hidden dark:inline"></i>
            </button>
        </div>
    </header>

    <div class="flex min-h-[calc(100vh-61px)]">
        
        <aside id="leftSidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 z-30 w-64 bg-white dark:bg-gray-950 border-r border-gray-200 dark:border-gray-800 overflow-y-auto p-4 transition-transform duration-200 ease-in-out md:sticky md:top-[61px] md:h-[calc(100vh-61px)]">
            <div class="flex items-center justify-between mb-4 pb-2 border-b border-gray-100 dark:border-gray-800">
                <span class="font-semibold uppercase tracking-wider text-xs text-gray-400">Topics Hierarchy</span>
                <button id="toggleAllTopics" class="text-xs text-green-600 hover:underline">Collapse All</button>
            </div>
            <nav id="topicsTree" class="space-y-1"></nav>
        </aside>

        <!-- <aside id="middleSidebar" class="w-60 border-r border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-900/50 p-4 sticky top-[61px] h-[calc(100vh-61px)] overflow-y-auto hidden lg:block">
            <span class="font-semibold uppercase tracking-wider text-xs text-gray-400 block mb-3">Subtopics</span>
            <ul id="subtopicsList" class="space-y-1 text-sm">
                </ul>
        </aside> -->

        <main class="flex-1 p-6 md:p-8 overflow-x-hidden">
            <div id="contentView" class="max-w-4xl mx-auto grid grid-cols-1 xl:grid-cols-4 gap-8">
                <article class="xl:col-span-3">
                    <nav id="breadcrumbs" class="text-xs text-gray-500 mb-2 flex items-center space-x-2"></nav>
                    <h1 id="articleTitle" class="text-3xl font-extrabold text-gray-900 dark:text-white mb-2"></h1>
                    <div class="text-xs text-gray-400 mb-6 flex items-center space-x-4">
                        <!-- <span><i class="fa-regular fa-calendar-check mr-1"></i> Updated: <span id="articleDate">-</span></span> -->
                        <button id="copyUrlBtn" class="hover:text-green-500 transition-colors"><i class="fa-solid fa-share-nodes mr-1"></i> Share URL</button>
                    </div>
                    
                    <div id="articleBody" class="prose dark:prose-invert max-w-none">
                        </div>
                </article>

                <aside class="hidden xl:block xl:col-span-1">
                    <div class="sticky top-[85px] space-y-6">
                        <div class="bg-white dark:bg-gray-950 p-4 rounded-xl border border-gray-100 dark:border-gray-800 shadow-sm">
                            <h4 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-3">On This Page</h4>
                            <ul id="tableOfContents" class="space-y-2 text-xs text-gray-600 dark:text-gray-400 border-l border-gray-200 dark:border-gray-800 pl-3">
                                </ul>
                        </div>
                        <div class="bg-white dark:bg-gray-950 p-4 rounded-xl border border-gray-100 dark:border-gray-800 shadow-sm space-y-4">
                            <div>
                                <h4 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-2"><i class="fa-regular fa-clock mr-1"></i> Recents</h4>
                                <ul id="recentList" class="text-xs space-y-1.5 text-gray-600 dark:text-gray-400"></ul>
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <div id="sidebarBackdrop" class="fixed inset-0 bg-black/40 z-20 hidden md:hidden"></div>

    <div id="searchModal" class="fixed inset-0 bg-black/60 z-50 flex items-start justify-center p-4 pt-[10vh] hidden">
        <div class="bg-white dark:bg-gray-950 w-full max-w-xl rounded-xl shadow-2xl border border-gray-200 dark:border-gray-800 overflow-hidden">
            <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex items-center">
                <i class="fa-solid fa-magnifying-glass text-gray-400 mr-3"></i>
                <input type="text" id="searchInput" placeholder="Search topics, content, courses... (ESC to close)" class="w-full bg-transparent border-none text-gray-900 dark:text-white placeholder-gray-400 outline-none text-base">
            </div>
            <div id="searchResults" class="max-h-80 overflow-y-auto p-2 space-y-1">
                </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
